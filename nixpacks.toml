# Nixpacks configuration for Railway deployment
# This tells Nixpacks how to build the Django application

[providers]
# Detect Python
python = true

# Skip Django detection since we have a Procfile
django = false

[build]
# Use the build.sh script
cmds = ["bash build.sh"]

[start]
# Use the railway_start.sh script from Procfile
cmd = "bash deploy/railway_start.sh"
