# render.yaml - Updated build command
services:
  - type: web
    name: baysoko
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py makemigrations
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
      python manage.py setup_oauth
    # Use Gunicorn with Uvicorn worker to serve ASGI (robust on Render)
    # Falls back to an ASGI server that handles HTTP and WebSockets reliably
    startCommand: gunicorn baysoko.asgi:application -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baysoko2
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_AIRLLM
        value: 'false'

  - type: worker
    name: baysoko-celery-worker
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
    startCommand: celery -A baysoko worker -l info -Q celery,periodic
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baysoko2
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_AIRLLM
        value: 'false'

  - type: worker
    name: baysoko-celery-beat
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
    # Run celery beat using django-celery-beat scheduler so periodic tasks stored in DB work
    startCommand: celery -A baysoko beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baysoko2
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_AIRLLM
        value: 'false'