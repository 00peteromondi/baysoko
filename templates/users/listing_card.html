{% load humanize %}
<div class="listing-card">
    <div class="listing-image-container">
        <img src="{{ listing.get_image_url }}" 
             class="listing-image"
             alt="{{ listing.title }}"
             onerror="this.src='https://placehold.co/400x300/c2c2c2/1f1f1f?text=Product'">
    </div>
    <div class="listing-content">
        <h3 class="listing-title">{{ listing.title }}</h3>
        <div class="listing-price">KSh {{ listing.price|intcomma }}</div>
        <div class="listing-meta">
            <span>{{ listing.condition|default:"New" }}</span>
            {% if listing.store %}
                <span>{{ listing.store.name }}</span>
            {% endif %}
        </div>
        <div class="listing-actions">
            <a href="{% url 'listing-detail' listing.pk %}" class="btn-custom btn-primary flex-fill btn-sm">
                <i class="bi bi-eye me-1"></i>View
            </a>
            {% if user.is_authenticated and user != profile_user %}
                <form action="{% url 'toggle_favorite' listing.id %}" method="post" class="favorite-form">
                    {% csrf_token %}
                    <button type="submit" class="btn-custom btn-ghost btn-sm">
                        <i class="bi bi-heart{% if listing.id in user_favorites %}-fill text-danger{% endif %}"></i>
                    </button>
                </form>
            {% endif %}
        </div>
    </div>
</div>
