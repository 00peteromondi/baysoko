{% load humanize %}
<div class="listing-card">
    <div class="listing-image-container">
        <img src="{{ store.get_logo_url|default:'https://placehold.co/400x300/c2c2c2/1f1f1f?text=Store' }}" 
             class="listing-image"
             alt="{{ store.name }}"
             style="object-fit: contain; background: white;">
    </div>
    <div class="listing-content">
        <h3 class="listing-title">{{ store.name }}</h3>
        <div class="listing-price">{{ store.listings.count }} products</div>
        <div class="listing-meta">
            <span>{{ store.get_average_store_rating|default:"New" }} ⭐</span>
            <span>{{ store.get_sales_count|default:"0" }}+ sales</span>
        </div>
        <div class="listing-actions">
            <a href="{% url 'storefront:store_detail' slug=store.slug %}" class="btn-custom btn-primary flex-fill btn-sm">
                <i class="bi bi-shop me-1"></i>View Store
            </a>
            {% if user == profile_user %}
            <a href="{% url 'storefront:store_edit' slug=store.slug %}" class="btn-custom btn-ghost btn-sm">
                <i class="bi bi-gear"></i>
            </a>
            {% endif %}
        </div>
    </div>
</div>
